name: pre-commit

on:
  workflow_dispatch:

jobs:
  lint-and-format:
    runs-on: ubuntu-latest

    steps:
      # To enable CI enforcement later, restore automatic triggers like:
      # pull_request:
      # push:
      #   branches: [main]
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Run pre-commit (all files)
        run: uvx pre-commit run --all-files
